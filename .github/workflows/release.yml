name: Release Build (Windows)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run check

      - name: Frontend tests
        run: npm run test

      - name: Build frontend
        run: npm run build

      - name: Backend tests
        run: cargo test
        working-directory: src-tauri

      - name: Build Tauri release bundle (NSIS)
        run: cargo tauri build
        working-directory: src-tauri

      - name: Smoke check installer artifact
        shell: pwsh
        run: |
          $installers = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis/*.exe" -File
          if (-not $installers -or $installers.Count -eq 0) {
            Write-Error "No NSIS installer found at src-tauri/target/release/bundle/nsis/*.exe"
            exit 1
          }

          foreach ($installer in $installers) {
            $hash = Get-FileHash -Path $installer.FullName -Algorithm SHA256
            Write-Host "Installer: $($installer.Name)"
            Write-Host "SizeBytes: $($installer.Length)"
            Write-Host "SHA256: $($hash.Hash)"
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: mia-search-windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Resolve release body file
        id: release_body
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $candidate = "docs/github_release_$tag.md"
          if (Test-Path $candidate) {
            "path=$candidate" >> $env:GITHUB_OUTPUT
          } else {
            Write-Error "Release body file not found: $candidate"
            exit 1
          }

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/nsis/*.exe
          body_path: ${{ steps.release_body.outputs.path }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
